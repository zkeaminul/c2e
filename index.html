<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PixelRanch Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #0b071e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 15px;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 15px;
            border-radius: 12px;
            border: 2px solid #3d1b7c;
        }
        .balance-box {
            text-align: center;
            margin: 20px 0;
        }
        .balance-title { font-size: 12px; color: #a19bb0; text-transform: uppercase; }
        .balance-amount { font-size: 38px; font-weight: bold; color: #00ff66; text-shadow: 0 0 10px rgba(0,255,102,0.5); }

        /* Pixel Ranch Grid Container */
        .ranch-container {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1;
            background: #150f30;
            border: 4px solid #5828b6;
            box-shadow: 0 0 20px rgba(88, 40, 182, 0.6);
            border-radius: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
            position: relative;
        }

        /* Grid Slot / Pet Box */
        .slot {
            background: #211747;
            border: 2px dashed #423081;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .slot:active { transform: scale(0.96); }
        .slot.active {
            background: linear-gradient(145deg, #2b1c5c, #190f3a);
            border: 2px solid #00ffff;
        }

        .pet-avatar { font-size: 50px; filter: drop-shadow(0 0 8px rgba(0,255,255,0.5)); }
        .pet-level {
            position: absolute;
            bottom: 8px;
            background: #00ffff;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 6px;
        }

        /* Stats & Action Footer */
        .footer-actions {
            width: 100%;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            color: #fff;
            box-shadow: 0 4px 0 #000;
        }
        .btn-buy { background: #ff007c; box-shadow: 0 4px 0 #b30054; }
        .btn-buy:active { transform: translateY(4px); box-shadow: none; }

        .energy-bar {
            width: 100%;
            height: 8px;
            background: #1d153a;
            border-radius: 4px;
            overflow: hidden;
        }
        .energy-fill { width: 100%; height: 100%; background: #ffcc00; transition: width 0.2s; }
        
        /* Floating Profit Animation */
        .floating-profit {
            position: absolute;
            color: #00ff66;
            font-weight: bold;
            font-size: 20px;
            animation: moveUp 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
    </style>
</head>
<body>

    <!-- Top Info -->
    <div class="top-bar">
        <span id="username" style="color: #00ffff; font-weight: bold;">Pixel_Rancher</span>
        <span style="color: #ff007c;">⭐ VIP 1</span>
    </div>

    <!-- Balance Screen -->
    <div class="balance-box">
        <div class="balance-title">PIXEL COINS</div>
        <div class="balance-amount" id="balance">0</div>
    </div>

    <!-- Pixel Ranch Grid (Slots for Pets) -->
    <div class="ranch-container" id="ranchGrid">
        <div class="slot active" onclick="tapSlot(this, 0)">
            <div class="pet-avatar">🐱</div>
            <div class="pet-level">Lv.1</div>
        </div>
        <div class="slot" id="slot-1" onclick="buyNewSlot(1)">
            <div class="pet-avatar" style="opacity: 0.3;">🔒</div>
            <div class="pet-level" style="background:#555;">500 COIN</div>
        </div>
        <div class="slot" id="slot-2" onclick="buyNewSlot(2)">
            <div class="pet-avatar" style="opacity: 0.3;">🔒</div>
            <div class="pet-level" style="background:#555;">2.5K COIN</div>
        </div>
        <div class="slot" id="slot-3" onclick="buyNewSlot(3)">
            <div class="pet-avatar" style="opacity: 0.3;">🔒</div>
            <div class="pet-level" style="background:#555;">10K COIN</div>
        </div>
    </div>

    <!-- Footer Settings & Control -->
    <div class="footer-actions">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#a19bb0;">
            <span>⚡ Ranch Energy</span>
            <span id="energy-txt">500/500</span>
        </div>
        <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
        
        <button class="btn btn-buy" onclick="upgradeActivePet()">🚀 UPGRADE PET (Cost: <span id="upgrade-cost">100</span>)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Game Logic States
        let coins = parseInt(localStorage.getItem('pr_coins')) || 0;
        let petLevel = parseInt(localStorage.getItem('pr_pet_lvl')) || 1;
        let energy = parseInt(localStorage.getItem('pr_energy')) || 500;
        let maxEnergy = 500;
        let unlockedSlots = JSON.parse(localStorage.getItem('pr_slots')) || [true, false, false, false];

        const slotCosts = [0, 500, 2500, 10000];
        const petAvatars = ["🐱", "🦊", "🤖", "🐉", "🦅"];

        function updateDisplay() {
            document.getElementById('balance').innerText = coins.toLocaleString();
            document.getElementById('energy-txt').innerText = `${energy}/${maxEnergy}`;
            document.getElementById('energy-fill').style.width = `${(energy/maxEnergy)*100}%`;
            document.getElementById('upgrade-cost').innerText = (petLevel * 100);
            
            // Update slots UI
            unlockedSlots.forEach((unlocked, index) => {
                if(index === 0) return;
                const slot = document.getElementById(`slot-${index}`);
                if(unlocked) {
                    slot.classList.add('active');
                    slot.setAttribute('onclick', `tapSlot(this, ${index})`);
                    slot.innerHTML = `<div class="pet-avatar">${petAvatars[index % petAvatars.length]}</div><div class="pet-level">Lv.${petLevel}</div>`;
                }
            });
        }

        // Tap Mechanics
        function tapSlot(element, index) {
            if (energy > 0) {
                let profit = petLevel * 2;
                coins += profit;
                energy -= 2;
                
                localStorage.setItem('pr_coins', coins);
                localStorage.setItem('pr_energy', energy);
                updateDisplay();
                
                // Haptic Feedback
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

                // Floating point effect
                const rect = element.getBoundingClientRect();
                const text = document.createElement('div');
                text.className = 'floating-profit';
                text.innerText = `+${profit}`;
                text.style.left = `${rect.width/2 - 10}px`;
                text.style.top = `${rect.height/2 - 20}px`;
                element.appendChild(text);
                setTimeout(() => text.remove(), 600);
            }
        }

        // Buy/Unlock new Ranch spots
        function buyNewSlot(index) {
            let cost = slotCosts[index];
            if(coins >= cost && !unlockedSlots[index]) {
                coins -= cost;
                unlockedSlots[index] = true;
                localStorage.setItem('pr_coins', coins);
                localStorage.setItem('pr_slots', JSON.stringify(unlockedSlots));
                updateDisplay();
            } else {
                tg.showAlert("Not enough Pixel Coins or already unlocked!");
            }
        }

        // Upgrade character level
        function upgradeActivePet() {
            let cost = petLevel * 100;
            if(coins >= cost) {
                coins -= cost;
                petLevel++;
                localStorage.setItem('pr_coins', coins);
                localStorage.setItem('pr_pet_lvl', petLevel);
                
                // Dynamic level update
                document.querySelectorAll('.slot.active .pet-level').forEach(el => {
                    el.innerText = `Lv.${petLevel}`;
                });
                updateDisplay();
                tg.showAlert("Pet Upgraded Successfully! 🎉");
            } else {
                tg.showAlert("Insufficient Coins!");
            }
        }

        // Auto energy recovery
        setInterval(() => {
            if(energy < maxEnergy) {
                energy += 5;
                if(energy > maxEnergy) energy = maxEnergy;
                localStorage.setItem('pr_energy', energy);
                updateDisplay();
            }
        }, 2000);

        updateDisplay();
    </script>
</body>
</html>
