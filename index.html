<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberMining - Tap to Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1a0b2e 0%, #090514 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
        }

        /* Header UI */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
        }

        .user-tag {
            background: rgba(255, 255, 255, 0.07);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #00ffcc;
        }

        /* Score Display */
        .score-container {
            text-align: center;
            margin-top: 20px;
        }

        .score-title {
            font-size: 14px;
            color: #8b80a5;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score {
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Main Clicker Coin */
        .coin-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: auto 0;
        }

        .coin {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00ffcc 0%, #0077ff 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease;
            position: relative;
            border: 6px solid #110724;
        }

        .coin::after {
            content: '⚡';
            font-size: 80px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        .coin:active {
            transform: scale(0.95);
        }

        /* Floating +1 Text Animation */
        .floating-text {
            position: absolute;
            font-size: 28px;
            font-weight: 800;
            color: #00ffcc;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.2); }
        }

        /* Footer Energy Bar */
        .footer-status {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 10px;
        }

        .energy-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
            color: #d1cadd;
        }

        .energy-bar-bg {
            width: 100%;
            height: 12px;
            background: #150e26;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .energy-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff007f, #00ffcc);
            border-radius: 10px;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="user-tag" id="username">Cyber Miner</div>
        <div class="user-tag" style="color: #ff007f;">⚡ Level 1</div>
    </div>

    <!-- Score -->
    <div class="score-container">
        <div class="score-title">Total Balance</div>
        <div class="score" id="balance">0</div>
    </div>

    <!-- Clickable Coin -->
    <div class="coin-container">
        <div class="coin" id="coinBtn"></div>
    </div>

    <!-- Energy Status -->
    <div class="footer-status">
        <div class="energy-header">
            <span>⚡ Energy</span>
            <span id="energy-text">1000 / 1000</span>
        </div>
        <div class="energy-bar-bg">
            <div class="energy-bar-fill" id="energy-fill"></div>
        </div>
    </div>

    <script>
        // Telegram WebApp Initialization
        const tg = window.Telegram.WebApp;
        tg.expand(); // Full screen open

        // Load username from Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = `🛸 ${tg.initDataUnsafe.user.first_name}`;
        }

        // App States
        let balance = parseInt(localStorage.getItem('mine_balance')) || 0;
        let energy = parseInt(localStorage.getItem('mine_energy')) || 1000;
        const maxEnergy = 1000;
        const tapReward = 1;

        // Elements
        const balanceEl = document.getElementById('balance');
        const energyTextEl = document.getElementById('energy-text');
        const energyFillEl = document.getElementById('energy-fill');
        const coinBtn = document.getElementById('coinBtn');

        // Update UI initially
        function updateUI() {
            balanceEl.innerText = balance.toLocaleString();
            energyTextEl.innerText = `${energy} / ${maxEnergy}`;
            const percentage = (energy / maxEnergy) * 100;
            energyFillEl.style.width = `${percentage}%`;
        }
        updateUI();

        // Tap Event
        coinBtn.addEventListener('click', (e) => {
            if (energy >= tapReward) {
                // Deduct energy & add balance
                balance += tapReward;
                energy -= tapReward;
                
                // Save to Local Storage
                localStorage.setItem('mine_balance', balance);
                localStorage.setItem('mine_energy', energy);

                updateUI();
                createFloatingText(e);
                
                // Telegram haptic feedback (vibration)
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }
            }
        });

        // Floating "+1" Animation
        function createFloatingText(e) {
            const rect = coinBtn.getBoundingClientRect();
            // Supports both click and multi-touch coordinates
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

            const text = document.createElement('div');
            text.classList.add('floating-text');
            text.innerText = `+${tapReward}`;
            text.style.left = `${x}px`;
            text.style.top = `${y}px`;

            coinBtn.appendChild(text);

            setTimeout(() => {
                text.remove();
            }, 800);
        }

        // Energy Recovery System (Every 1 second +1 energy)
        setInterval(() => {
            if (energy < maxEnergy) {
                energy += 1;
                localStorage.setItem('mine_energy', energy);
                updateUI();
            }
        }, 1000);
    </script>
</body>
</html>
